name: NU Notice Auto Scraper

on:
  schedule:
    # প্রতিদিন বাংলাদেশ সময় সকাল ১০:০০ টা এবং রাত ৮:০০ টায় স্বয়ংক্রিয়ভাবে চলবে
    - cron: '0 4 * * *'  # UTC 4:00 AM = BD 10:00 AM
    - cron: '0 14 * * *' # UTC 2:00 PM = BD 8:00 PM
  workflow_dispatch: # ম্যানুয়ালি রান করার অপশন

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests selenium webdriver-manager

    - name: Run Scraper Script
      run: python scraper.py